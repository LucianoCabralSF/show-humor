<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show de Humor - Fabio & Mundica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .card-show { background: #121212; border: 1px solid #333; border-radius: 24px; overflow: hidden; }
        .btn-buy { background: #e11d48; transition: all 0.3s ease; }
        .btn-buy:hover { background: #be123c; transform: translateY(-2px); }
        .glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .sector-option input:checked + span {
            border-color: #eab308;
            background: rgba(234, 179, 8, 0.12);
            box-shadow: 0 0 0 1px rgba(234, 179, 8, 0.55);
        }
        .field-control {
            width: 100%;
            padding: 1rem;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 0.75rem;
            outline: none;
        }
        .field-control:focus { border-color: #eab308; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="card-show max-w-md w-full shadow-2xl glow">
        <img src="cartaz.jpeg" alt="Show de Humor Fabio e Mundica" class="w-full h-auto border-b border-zinc-800">

        <div class="p-8">
            <header class="text-center mb-6">
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase">Garanta seu Ingresso</h1>
                <p class="text-gray-500 text-[10px] tracking-widest uppercase mt-1">Auditório Instituto Lótus</p>
            </header>

            <form id="formIngresso" class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Nome Completo</label>
                    <input type="text" id="nome" name="nome" autocomplete="name" required placeholder="Como no documento"
                           class="field-control">
                </div>

                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">E-mail</label>
                    <input type="email" id="email" name="email" autocomplete="email" required placeholder="seuemail@exemplo.com"
                           class="field-control">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Idade (15+)</label>
                        <input type="number" id="idade" name="idade" min="15" required placeholder="Ex: 20"
                               class="field-control">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">WhatsApp</label>
                        <input type="tel" id="whatsapp" name="whatsapp" autocomplete="tel" required placeholder="(92) 9..."
                               class="field-control">
                    </div>
                </div>

                <div>
                    <p class="text-[10px] uppercase text-gray-500 font-bold ml-1">Escolha seu ingresso</p>
                    <div class="mt-2 grid gap-3 sm:grid-cols-2">
                        <label class="sector-option cursor-pointer">
                            <input type="radio" name="setor" value="Plateia Geral" class="sr-only" checked>
                            <span class="block h-full rounded-xl border border-zinc-700 bg-zinc-800 p-4 transition">
                                <span class="block text-base font-black text-white">Plateia Geral</span>
                                <span class="mt-1 block text-2xl font-black text-yellow-500">R$ 30,00</span>
                                <span class="mt-2 block text-xs font-bold leading-relaxed text-zinc-400">Entrada geral para o show.</span>
                            </span>
                        </label>
                        <label class="sector-option cursor-pointer">
                            <input type="radio" name="setor" value="Área Premium ( Cadeiras Próximas ao Palco )" class="sr-only">
                            <span class="block h-full rounded-xl border border-zinc-700 bg-zinc-800 p-4 transition">
                                <span class="block text-base font-black text-white">Área Premium / VIP</span>
                                <span class="mt-1 block text-2xl font-black text-yellow-500">R$ 40,00</span>
                                <span class="mt-2 block text-xs font-bold leading-relaxed text-zinc-400">Cadeiras próximas ao palco.</span>
                            </span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Quantidade de ingressos</label>
                    <select id="quantidade" name="quantidade" class="field-control">
                        <option value="1">1 ingresso</option>
                        <option value="2">2 ingressos</option>
                        <option value="3">3 ingressos</option>
                        <option value="4">4 ingressos</option>
                        <option value="5">5 ingressos</option>
                        <option value="6">6 ingressos</option>
                    </select>
                </div>

                <div id="acompanhantesBlock" class="hidden rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                    <p class="text-[10px] uppercase text-gray-500 font-bold">Dados dos demais ingressos</p>
                    <p class="mt-1 text-xs leading-relaxed text-zinc-400">Para acompanhantes, informe somente nome e idade.</p>
                    <div id="acompanhantesFields" class="mt-4 space-y-4"></div>
                </div>

                <div class="rounded-2xl border border-yellow-500/30 bg-yellow-500/10 p-4">
                    <p class="text-[10px] uppercase text-yellow-500 font-bold">Total da compra</p>
                    <p id="totalCompra" class="mt-1 text-2xl font-black text-white">R$ 30,00</p>
                </div>

                <button type="submit" id="btnAcao" class="btn-buy w-full py-5 rounded-2xl font-black uppercase text-lg shadow-lg mt-4 transition-all active:scale-95">
                    Comprar 1 ingresso
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-[10px] text-gray-500 font-bold uppercase">
                    Evento Oficial - Ingressos Limitados (100 un)
                </p>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwr33lbAy-1pr2iIV7pRkymPVSqNT24ZOMb3c-WOcQMngRvIjyJK2XlLKnBNoXOfBfu/exec';
        const PRECOS = {
            'Plateia Geral': 3000,
            'Área Premium ( Cadeiras Próximas ao Palco )': 4000
        };
        const quantidade = document.getElementById('quantidade');
        const acompanhantesBlock = document.getElementById('acompanhantesBlock');
        const acompanhantesFields = document.getElementById('acompanhantesFields');
        const totalCompra = document.getElementById('totalCompra');
        const btnAcao = document.getElementById('btnAcao');

        function formatMoney(cents) {
            return (cents / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function getSelectedSetor() {
            return document.querySelector('input[name="setor"]:checked').value;
        }

        function getQuantidade() {
            return Number(quantidade.value || 1);
        }

        function updateTotal() {
            const total = (PRECOS[getSelectedSetor()] || 0) * getQuantidade();
            totalCompra.textContent = formatMoney(total);
            btnAcao.innerText = `Comprar ${getQuantidade()} ${getQuantidade() === 1 ? 'ingresso' : 'ingressos'}`;
        }

        function renderAcompanhantes() {
            const total = getQuantidade();
            const acompanhantes = Math.max(total - 1, 0);
            acompanhantesBlock.classList.toggle('hidden', acompanhantes === 0);
            acompanhantesFields.innerHTML = '';

            for (let index = 1; index <= acompanhantes; index++) {
                const item = document.createElement('div');
                item.className = 'rounded-xl border border-zinc-800 bg-zinc-950 p-4';
                item.innerHTML = `
                    <p class="text-xs font-black uppercase text-yellow-500">Acompanhante ${index}</p>
                    <div class="mt-3 grid gap-3 sm:grid-cols-[1fr_92px]">
                        <div>
                            <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Nome</label>
                            <input type="text" class="field-control acompanhante-nome" required placeholder="Nome completo">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Idade</label>
                            <input type="number" min="15" class="field-control acompanhante-idade" required placeholder="15+">
                        </div>
                    </div>
                `;
                acompanhantesFields.appendChild(item);
            }

            updateTotal();
        }

        function getAcompanhantes() {
            const nomes = Array.from(document.querySelectorAll('.acompanhante-nome'));
            const idades = Array.from(document.querySelectorAll('.acompanhante-idade'));
            return nomes.map((input, index) => ({
                nome: input.value.trim(),
                idade: idades[index].value.trim()
            }));
        }

        function restoreButton() {
            const btn = document.getElementById('btnAcao');
            btn.disabled = false;
            updateTotal();
        }

        document.querySelectorAll('input[name="setor"]').forEach((input) => {
            input.addEventListener('change', updateTotal);
        });

        quantidade.addEventListener('change', renderAcompanhantes);
        renderAcompanhantes();

        document.getElementById('formIngresso').addEventListener('submit', (event) => {
            event.preventDefault();

            const btn = document.getElementById('btnAcao');
            btn.disabled = true;
            btn.innerText = 'PROCESSANDO...';
            const acompanhantes = getAcompanhantes();

            const callbackName = 'checkoutCallback_' + Date.now();
            const params = new URLSearchParams({
                action: 'checkout',
                callback: callbackName,
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                idade: document.getElementById('idade').value.trim(),
                whatsapp: document.getElementById('whatsapp').value.trim(),
                setor: getSelectedSetor(),
                quantidade: String(getQuantidade()),
                acompanhantes: JSON.stringify(acompanhantes)
            });

            const script = document.createElement('script');
            const timeout = window.setTimeout(() => {
                delete window[callbackName];
                script.remove();
                restoreButton();
                alert('Não foi possível gerar o checkout. Tente novamente.');
            }, 20000);

            window[callbackName] = (data) => {
                window.clearTimeout(timeout);
                delete window[callbackName];
                script.remove();

                if (data && data.url) {
                    window.location.href = data.url;
                    return;
                }

                restoreButton();
                alert((data && data.error) || 'Não foi possível gerar o checkout. Tente novamente.');
            };

            script.onerror = () => {
                window.clearTimeout(timeout);
                delete window[callbackName];
                script.remove();
                restoreButton();
                alert('Erro ao conectar com o servidor. Tente novamente.');
            };

            script.src = `${APPS_SCRIPT_URL}?${params.toString()}`;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
