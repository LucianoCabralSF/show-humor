<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos - Show de Humor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .card-show { background: #121212; border: 1px solid #333; border-radius: 24px; }
        .btn-buy { background: #e11d48; transition: all 0.3s ease; }
        .btn-buy:hover { background: #be123c; transform: translateY(-2px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card-show max-w-md w-full p-8 shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-yellow-500 italic uppercase">Show de Humor</h1>
            <p class="text-gray-400 text-sm tracking-widest uppercase">Nova Olinda do Norte</p>
        </header>

        <form id="formIngresso" class="space-y-4">
            <div>
                <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Nome Completo</label>
                <input type="text" id="nome" required 
                       class="w-full p-4 bg-zinc-800 rounded-xl border border-zinc-700 outline-none focus:border-yellow-500">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Idade (15+)</label>
                    <input type="number" id="idade" min="15" required 
                           class="w-full p-4 bg-zinc-800 rounded-xl border border-zinc-700 outline-none focus:border-yellow-500">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">WhatsApp</label>
                    <input type="tel" id="whatsapp" required 
                           class="w-full p-4 bg-zinc-800 rounded-xl border border-zinc-700 outline-none focus:border-yellow-500">
                </div>
            </div>

            <div>
                <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Escolha seu lugar:</label>
                <select id="setor" class="w-full p-4 bg-zinc-800 rounded-xl border border-zinc-700 outline-none focus:border-yellow-500">
                    <option value="Plateia Geral">Plateia Geral - R$ 30,00</option>
                    <option value="Lote VIP">Lote VIP - R$ 40,00</option>
                </select>
            </div>

            <button type="submit" id="btnAcao" class="btn-buy w-full py-5 rounded-2xl font-black uppercase text-lg shadow-lg mt-6">
                Comprar Ingresso
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-[10px] text-gray-500 uppercase font-bold">
                ⚠️ Classificação 15 Anos | Ingressos Limitados
            </p>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwr33lbAy-1pr2iIV7pRkymPVSqNT24ZOMb3c-WOcQMngRvIjyJK2XlLKnBNoXOfBfu/exec';
        const INFINITE_LINK = 'https://checkout.infinitepay.io/grupocabramacho/zXtqy0MnCw';

        document.getElementById('formIngresso').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnAcao');
            btn.disabled = true;
            btn.innerText = 'PROCESSANDO...';

            const dados = {
                nome: document.getElementById('nome').value,
                idade: document.getElementById('idade').value,
                whatsapp: document.getElementById('whatsapp').value,
                setor: document.getElementById('setor').value
            };

            try {
                // Registro silencioso na planilha
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(dados)
                });

                // Redireciona para o checkout oficial da InfinitePay
                window.location.href = INFINITE_LINK;
            } catch (err) {
                alert('Erro ao processar. Tente novamente.');
                btn.disabled = false;
                btn.innerText = 'Comprar Ingresso';
            }
        };
    </script>
</body>
</html>
