<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Show de Humor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { background: #050505; color: white; }
        .panel { background: #121212; border: 1px solid #333; border-radius: 16px; }
        .result-success { background: #16a34a; }
        .result-warning { background: #ca8a04; }
        .result-error { background: #dc2626; }
        #reader video { object-fit: cover; }
    </style>
</head>
<body class="min-h-screen p-3 font-sans sm:p-5">
    <main class="mx-auto grid w-full max-w-6xl gap-4 lg:grid-cols-[minmax(0,1fr)_380px]">
        <section class="panel overflow-hidden shadow-2xl">
            <header class="border-b border-zinc-800 p-4 text-center sm:p-5">
                <p class="text-[10px] font-bold uppercase tracking-widest text-yellow-500">Instituto Lótus</p>
                <h1 class="mt-1 text-xl font-black uppercase sm:text-2xl">Leitor da portaria</h1>
            </header>

            <div class="grid gap-4 p-4 sm:p-5 md:grid-cols-[minmax(0,1fr)_280px]">
                <div>
                    <div class="relative mx-auto aspect-square max-h-[68vh] w-full overflow-hidden rounded-2xl bg-black">
                        <div id="reader" class="h-full w-full"></div>
                        <div class="pointer-events-none absolute inset-8 rounded-3xl border-4 border-yellow-500/80"></div>
                    </div>

                    <button id="btnCamera" type="button" class="mt-3 w-full rounded-2xl bg-yellow-500 py-4 text-sm font-black uppercase text-black active:scale-95">
                        Abrir câmera
                    </button>
                </div>

                <div class="space-y-4">
                    <section id="resultBox" class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4 text-center">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Última leitura</p>
                        <h2 id="resultTitle" class="mt-2 text-2xl font-black uppercase text-zinc-200">Aguardando</h2>
                        <p id="resultName" class="mt-2 text-lg font-bold text-white">Nenhum ingresso lido</p>
                        <p id="resultMessage" class="mt-1 text-sm text-zinc-400">Abra a câmera ou digite o código.</p>
                    </section>

                    <form id="manualForm" class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Validação manual</label>
                        <div class="grid grid-cols-[1fr_auto] gap-2">
                            <input id="manualCode" type="text" placeholder="HM-000000"
                                   class="min-w-0 rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 uppercase outline-none focus:border-yellow-500">
                            <button class="rounded-xl bg-zinc-800 px-4 py-3 text-sm font-black uppercase active:scale-95" type="submit">
                                Validar
                            </button>
                        </div>
                    </form>

                    <p id="status" class="min-h-5 text-center text-sm text-zinc-400"></p>
                </div>
            </div>
        </section>

        <aside class="panel flex min-h-[260px] flex-col p-4 shadow-2xl sm:p-5">
            <div class="flex items-center justify-between gap-3 border-b border-zinc-800 pb-3">
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-yellow-500">Histórico local</p>
                    <h2 class="text-lg font-black uppercase">Leituras</h2>
                </div>
                <button id="clearHistory" type="button" class="rounded-lg bg-zinc-800 px-3 py-2 text-[11px] font-black uppercase active:scale-95">
                    Limpar
                </button>
            </div>

            <ol id="historyList" class="mt-4 max-h-[48vh] flex-1 space-y-2 overflow-auto pr-1"></ol>
            <p id="emptyHistory" class="mt-8 text-center text-sm text-zinc-500">Nenhuma leitura registrada nesta tela.</p>
        </aside>
    </main>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwr33lbAy-1pr2iIV7pRkymPVSqNT24ZOMb3c-WOcQMngRvIjyJK2XlLKnBNoXOfBfu/exec';
        const HISTORY_KEY = 'showHumorGateReads';
        const btnCamera = document.getElementById('btnCamera');
        const statusText = document.getElementById('status');
        const manualForm = document.getElementById('manualForm');
        const manualCode = document.getElementById('manualCode');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultName = document.getElementById('resultName');
        const resultMessage = document.getElementById('resultMessage');
        const historyList = document.getElementById('historyList');
        const emptyHistory = document.getElementById('emptyHistory');
        const clearHistory = document.getElementById('clearHistory');
        let html5QrCode;
        let reading = false;
        let cameraRunning = false;

        function setStatus(message) {
            statusText.textContent = message;
        }

        function extractTicketID(value) {
            const text = String(value || '').trim();
            if (!text) return '';
            if (!text.startsWith('http')) return text.toUpperCase();
            const url = new URL(text);
            return (url.searchParams.get('id') || '').toUpperCase();
        }

        function validateTicket(value) {
            const ticketID = extractTicketID(value);
            if (!ticketID || reading) return;
            reading = true;
            setStatus('Validando ingresso...');

            const callbackName = 'validateCallback_' + Date.now();
            const params = new URLSearchParams({
                action: 'validateData',
                callback: callbackName,
                id: ticketID
            });
            const script = document.createElement('script');
            const timeout = window.setTimeout(() => {
                cleanup();
                showResult({ type: 'error', title: 'ERRO', name: ticketID, ticketID, message: 'Tempo de validação esgotado.' });
            }, 15000);

            function cleanup() {
                reading = false;
                window.clearTimeout(timeout);
                delete window[callbackName];
                script.remove();
            }

            window[callbackName] = (data) => {
                cleanup();
                showResult(data);
                saveHistory(data);
                manualCode.value = '';
            };

            script.onerror = () => {
                cleanup();
                showResult({ type: 'error', title: 'ERRO', name: ticketID, ticketID, message: 'Falha ao conectar com a planilha.' });
            };

            script.src = `${WEB_APP_URL}?${params.toString()}`;
            document.body.appendChild(script);
        }

        function showResult(data) {
            const type = data.type || 'error';
            resultBox.className = `rounded-2xl p-4 text-center text-white result-${type}`;
            resultTitle.textContent = data.title || 'ERRO';
            resultName.textContent = data.name || 'Não encontrado';
            resultMessage.textContent = data.message || data.ticketID || '';
            setStatus('Pronto para a próxima leitura.');
            playTone(type);
        }

        function playTone(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const audio = new AudioContext();
            const now = audio.currentTime;
            const tones = type === 'success'
                ? [{ f: 660, t: 0 }, { f: 880, t: 0.14 }]
                : [{ f: 220, t: 0 }, { f: 160, t: 0.18 }];

            tones.forEach((tone) => {
                const osc = audio.createOscillator();
                const gain = audio.createGain();
                osc.frequency.value = tone.f;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.0001, now + tone.t);
                gain.gain.exponentialRampToValueAtTime(0.28, now + tone.t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + tone.t + 0.14);
                osc.connect(gain);
                gain.connect(audio.destination);
                osc.start(now + tone.t);
                osc.stop(now + tone.t + 0.16);
            });
        }

        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            } catch (err) {
                return [];
            }
        }

        function saveHistory(data) {
            const history = getHistory();
            history.unshift({
                time: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                ticketID: data.ticketID || '-',
                name: data.name || '-',
                title: data.title || 'ERRO',
                type: data.type || 'error'
            });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 80)));
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            historyList.innerHTML = '';
            emptyHistory.classList.toggle('hidden', history.length > 0);

            history.forEach((item, index) => {
                const li = document.createElement('li');
                const color = item.type === 'success' ? 'border-green-500/60' : item.type === 'warning' ? 'border-yellow-500/60' : 'border-red-500/60';
                li.className = `rounded-xl border ${color} bg-zinc-900 p-3`;
                li.innerHTML = `
                    <div class="flex items-start justify-between gap-3">
                        <strong class="text-sm text-white">${index + 1}. ${item.name}</strong>
                        <span class="shrink-0 text-xs text-zinc-400">${item.time}</span>
                    </div>
                    <p class="mt-1 text-xs font-bold uppercase text-zinc-400">${item.ticketID} • ${item.title}</p>
                `;
                historyList.appendChild(li);
            });
        }

        btnCamera.addEventListener('click', async () => {
            try {
                if (!window.Html5Qrcode) {
                    setStatus('Leitor de câmera indisponível. Digite o código manualmente.');
                    return;
                }

                if (html5QrCode && cameraRunning) {
                    await html5QrCode.stop();
                    cameraRunning = false;
                    btnCamera.textContent = 'Abrir câmera';
                    setStatus('Câmera pausada.');
                    return;
                }

                html5QrCode = html5QrCode || new Html5Qrcode('reader');
                btnCamera.textContent = 'Pausar câmera';
                setStatus('Aponte para o QR Code na tela do cliente.');
                await html5QrCode.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 240, height: 240 } },
                    (decodedText) => {
                        if (reading || !cameraRunning) return;
                        cameraRunning = false;
                        btnCamera.textContent = 'Ler próximo ingresso';
                        html5QrCode.stop().finally(() => validateTicket(decodedText));
                    }
                );
                cameraRunning = true;
            } catch (err) {
                cameraRunning = false;
                btnCamera.textContent = 'Abrir câmera';
                setStatus('Câmera bloqueada. Libere a permissão ou valide pelo código.');
            }
        });

        manualForm.addEventListener('submit', (event) => {
            event.preventDefault();
            validateTicket(manualCode.value);
        });

        clearHistory.addEventListener('click', () => {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        });

        renderHistory();
    </script>
</body>
</html>
